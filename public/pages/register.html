<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CodeAlpha Store</title>
  <meta name="description" content="Register a new student showcase account immediately and checkout workspace gears seamlessly.">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Dynamic Global Navbar Injection Placeholder -->
  <header id="navbar-placeholder"></header>

  <main class="auth-page-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register to unlock orders history and secure cart checkout</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="reg-name" class="form-label">Full Name</label>
          <input type="text" id="reg-name" class="form-input" placeholder="e.g. Jane Student" required>
        </div>
        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-input" placeholder="e.g. jstudent@mail.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password" class="form-label">Password</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group" style="margin-bottom:2rem;">
          <label for="reg-confirm-password" class="form-label">Confirm Password</label>
          <input type="password" id="reg-confirm-password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; padding:0.75rem; font-size:1.05rem;">
          Register Now
        </button>
      </form>

      <div class="auth-redirect-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </main>

  <!-- Dynamic Global Footer Injection Placeholder -->
  <footer id="footer-placeholder"></footer>

  <!-- Scripts -->
  <script src="../js/common.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
